services:
  neo4j:
    image: neo4j:5.26.20-community
    container_name: knowloop-neo4j
    ports:
      - "7474:7474"  # HTTP Browser
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/orchestrator123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=2G
      - NEO4J_dbms_memory_heap_max__size=4G
      - NEO4J_dbms_memory_transaction_total_max=4G
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
      - ./init/neo4j:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - knowloop-net

  meilisearch:
    image: getmeili/meilisearch:v1.34.2
    container_name: knowloop-meilisearch
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=orchestrator-meili-key-change-me
      - MEILI_ENV=development
      - MEILI_LOG_LEVEL=INFO
      - MEILI_MAX_INDEXING_MEMORY=512MiB
    volumes:
      - ./data/meilisearch:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowloop-net

  nats:
    image: nats:2.11-alpine
    container_name: knowloop-nats
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    command: ["--http_port", "8222", "--jetstream"]
    volumes:
      - ./data/nats:/data/jetstream
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowloop-net

  knowloop:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowloop-server
    ports:
      - "8080:8080"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=orchestrator123
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_KEY=orchestrator-meili-key-change-me
      - SETUP_COMPLETED=true
      - RUST_LOG=info,knowloop=debug
      - WORKSPACE_PATH=/workspace
      - NATS_URL=nats://nats:4222
    depends_on:
      neo4j:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - ./workspace:/workspace:ro
      - ./data/knowloop:/data
    networks:
      - knowloop-net

networks:
  knowloop-net:
    driver: bridge
